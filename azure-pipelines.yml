# azure-pipelines.yml
trigger:
  branches:
    include:
      - main
      - develop
      - feature/*

pool:
  vmImage: 'windows-latest'  # Agente hospedado por Microsoft

variables:
  buildConfiguration: 'Release'

steps:
# 1️⃣ Instalar .NET 8 SDK (respetando el proyecto net8.0)
- task: UseDotNet@2
  displayName: 'Instalar .NET 8 SDK'
  inputs:
    packageType: 'sdk'
    version: '8.0.x'

# 2️⃣ Restaurar paquetes NuGet
- task: DotNetCoreCLI@2
  displayName: 'Restaurar paquetes NuGet'
  inputs:
    command: 'restore'
    projects: '**/*.csproj'

# 3️⃣ Construir solución
- task: DotNetCoreCLI@2
  displayName: 'Construir solución'
  inputs:
    command: 'build'
    projects: '**/*.csproj'
    arguments: '--configuration $(buildConfiguration)'

# 4️⃣ Ejecutar pruebas (si se llega a agregar más adelante)
- task: DotNetCoreCLI@2
  displayName: 'Ejecutar pruebas'
  inputs:
    command: 'test'
    projects: '**/*Tests/*.csproj'
    arguments: '--configuration $(buildConfiguration) --no-build'

# 5️⃣ Publicar artefactos (opcional para deploy futuro)
- task: PublishBuildArtifacts@1
  displayName: 'Publicar artefactos'
  inputs:
    PathtoPublish: '$(Build.ArtifactStagingDirectory)'
    ArtifactName: 'drop'
